<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("pokeVerseTheme");
        const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = savedTheme || preferredTheme;
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=index.html#pokedex">
  <title>PokeVerse - Pokedex</title>
  <link rel="icon" type="image/png" href="../images/branding/pokeverse-logo.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="section-shell" style="margin-top: 32px;">
    <p class="eyebrow">PokeVerse</p>
    <h1>Opening the Pokedex...</h1>
    <p><a href="index.html#pokedex">Continue to the Pokedex</a></p>
  </main>
</body>
</html>
